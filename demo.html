<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Démo Scala.js</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(140deg, #f8fbff, #eef4ff);
        color: #172033;
      }
      .container {
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 28, 85, 0.1);
      }
      #app h1 {
        margin-top: 0;
      }
      #app button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        background: #1864ff;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="app"></div>
    </div>

    <script src="target/scala-3.3.3/scalajs-reveal-demo-fastopt/main.js"></script>
  </body>
</html>
